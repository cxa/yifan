name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        run: |
          echo "FANFOU_CONSUMER_KEY=${{ secrets.FANFOU_CONSUMER_KEY }}" >> .env
          echo "FANFOU_CONSUMER_SECRET=${{ secrets.FANFOU_CONSUMER_SECRET }}" >> .env

      - name: Generate native secrets
        run: npm run env:generate

      - name: Read versions
        id: versions
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NATIVE_VERSION=$(node -p "require('./package.json').nativeVersion")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "native_version=${NATIVE_VERSION}" >> $GITHUB_OUTPUT

      - name: Bundle JS — Android
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output yifan.${{ steps.versions.outputs.version }}.android.jsbundle \
            --assets-dest /tmp/assets-android

      - name: Bundle JS — iOS
        run: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output yifan.${{ steps.versions.outputs.version }}.ios.jsbundle \
            --assets-dest /tmp/assets-ios

      - name: Create manifest.json
        run: |
          echo '{"minNativeVersion":"${{ steps.versions.outputs.native_version }}"}' > manifest.json

      - name: Decode keystore
        run: |
          echo "${{ secrets.YIFAN_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/yifan-release.keystore

      - name: Build release APK
        env:
          YIFAN_RELEASE_STORE_FILE: yifan-release.keystore
          YIFAN_RELEASE_STORE_PASSWORD: ${{ secrets.YIFAN_RELEASE_STORE_PASSWORD }}
          YIFAN_RELEASE_KEY_ALIAS: ${{ secrets.YIFAN_RELEASE_KEY_ALIAS }}
          YIFAN_RELEASE_KEY_PASSWORD: ${{ secrets.YIFAN_RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            -PYIFAN_RELEASE_STORE_FILE=$YIFAN_RELEASE_STORE_FILE \
            -PYIFAN_RELEASE_STORE_PASSWORD=$YIFAN_RELEASE_STORE_PASSWORD \
            -PYIFAN_RELEASE_KEY_ALIAS=$YIFAN_RELEASE_KEY_ALIAS \
            -PYIFAN_RELEASE_KEY_PASSWORD=$YIFAN_RELEASE_KEY_PASSWORD

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             yifan-${{ steps.versions.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versions.outputs.version }}
          name: ${{ steps.versions.outputs.version }}
          generate_release_notes: true
          files: |
            manifest.json
            yifan-${{ steps.versions.outputs.version }}.apk
            yifan-${{ steps.versions.outputs.version }}.android.jsbundle
            yifan-${{ steps.versions.outputs.version }}.ios.jsbundle
